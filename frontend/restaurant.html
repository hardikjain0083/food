<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Dashboard</title>
</head>
<body>

    <h2>Add Food</h2>

    <input id="food_name" placeholder="Food Name"><br><br>
    <input id="food_type" placeholder="veg / non-veg / jain"><br><br>
    <input id="shelf" placeholder="Shelf Life (hours)"><br><br>
    <input id="dry" placeholder="dry / wet"><br><br>
    <input id="cal" placeholder="Calories"><br><br>
    <input id="smu" placeholder="SMU Equivalent"><br><br>
    <input id="qty" placeholder="Quantity (SMU)"><br><br>

    <button onclick="addFood()">Add Food</button>

    <script src="script.js"></script>

</body>
</html>
